var c=document.getElementById("meteorCanvas"),x=c.getContext("2d"),W,H;

window.addEventListener("resize",rs);rs();

function Star(){this.x=Math.random()*W;this.y=Math.random()*H;this.s=Math.random()*1.8+0.5;this.v=Math.random()*0.008+0.003;this.p=Math.random()*6.28;this.g=Math.random()*50+200}

Star.prototype.draw=function(t){var b=0.4+0.6*(0.5+0.5*Math.sin(this.p+t*this.v));var sz=this.s*(0.7+0.3*b);var al=0.3+0.5*b;var cl=Math.round(200*b+40);x.beginPath();x.arc(this.x,this.y,sz,0,7);x.fillStyle="rgba("+cl+","+cl+","+Math.min(255,cl+10)+","+al+")";x.fill()};

function Meteor(){var side=Math.random();if(side<0.6){this.x=W*(0.6+Math.random()*0.4);this.y=H*Math.random()*0.25}else if(side<0.85){this.x=W*(0.95+Math.random()*0.05);this.y=H*Math.random()*0.5}else{this.x=W*(0.3+Math.random()*0.7);this.y=-10}var an=Math.PI*(0.55+Math.random()*0.25),sp=5+Math.random()*8;this.vx=Math.cos(an)*sp;this.vy=Math.sin(an)*sp;this.tr=[];this.mt=Math.floor(18+Math.random()*18);this.l=1;this.d2=0.003+Math.random()*0.008;var ct2=Math.random();if(ct2<0.6){this.h=210;this.sa=30}else if(ct2<0.85){this.h=0;this.sa=0}else{this.h=40;this.sa=50}this.hs=2+Math.random()*1.5}

Meteor.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;this.l-=this.d2;this.tr.push({x:this.x,y:this.y});if(this.tr.length>this.mt)this.tr.shift()};

Meteor.prototype.draw=function(){if(this.l<=0||this.tr.length<2)return;for(var i=0;i<this.tr.length-1;i++){var t=i/this.tr.length,a2=t*this.l*0.6,s3=t*this.hs*0.9;if(a2<0.01)continue;x.beginPath();x.arc(this.tr[i].x,this.tr[i].y,Math.max(s3,0.3),0,7);x.fillStyle="hsla("+this.h+","+this.sa+"%,"+(70+t*30)+"%,"+a2+")";x.fill()}var ha=Math.min(1,this.l*1.5),g2=x.createRadialGradient(this.x,this.y,0,this.x,this.y,this.hs*6);g2.addColorStop(0,"hsla("+this.h+","+this.sa+"%,100%,"+(ha*0.9)+")");g2.addColorStop(0.2,"hsla("+this.h+","+this.sa+"%,90%,"+(ha*0.4)+")");g2.addColorStop(1,"hsla("+this.h+","+this.sa+"%,80%,0)");x.beginPath();x.arc(this.x,this.y,this.hs*6,0,7);x.fillStyle=g2;x.fill();x.beginPath();x.arc(this.x,this.y,this.hs*0.8,0,7);x.fillStyle="hsla("+this.h+","+this.sa+"%,100%,"+ha+")";x.fill()};

Meteor.prototype.isDead=function(){return this.l<=0||this.x<-50||this.y>H+50||this.x>W+50};

var stars=[],meteors=[];

var _sc=150;for(var i=0;i<_sc;i++)stars.push(new Star);

for(var i=0;i<3;i++){var m=new Meteor;m.l=0.3+Math.random()*0.4;meteors.push(m)}

function anim(t){var at=t||0;x.fillStyle="rgba(0,0,0,0.15)";x.fillRect(0,0,W,H);for(var s of stars)s.draw(at);for(var i=meteors.length-1;i>=0;i--){var m=meteors[i];m.update();m.draw();if(m.isDead())meteors.splice(i,1)}if(Math.random()<Math.max(0.008,0.035-meteors.length*0.002))meteors.push(new Meteor);requestAnimationFrame(anim)}

requestAnimationFrame(anim);

var ct="login";

var qi=0;var qs=["以逻辑为剑","以真理为盾","言辞交锋处","智慧生长时","每一个观点都是一颗流星","与AI对辩","与时代同行","让思想在碰撞中闪光"];

setInterval(function(){qi=(qi+1)%qs.length;var qd=document.getElementById("quoteDisplay");if(qd)qd.textContent=qs[qi]},4000);

function switchTab(t){if(t===ct)return;ct=t;document.querySelectorAll(".tab").forEach(function(e){e.classList.toggle("active",e.dataset.tab===t)});document.getElementById("loginForm").classList.toggle("hidden",t!=="login");document.getElementById("registerForm").classList.toggle("hidden",t!=="register");var fl=document.getElementById("footerLink");if(t==="login"){fl.innerHTML='尚未注册？<a onclick=\"switchTab(\'register\')\">成为辩手</a>';}else{fl.innerHTML='已有账号？<a onclick=\"switchTab(\'login\')\">进入辩场</a>';}cs();}

function cs(){document.querySelectorAll(".status-msg").forEach(function(e){e.classList.remove("show","success","error");e.textContent=""});document.querySelectorAll(".input-error").forEach(function(e){e.classList.remove("input-error")})}

function ss(id,msg,ty){var el=document.getElementById(id);el.textContent=msg;el.className="status-msg show "+ty;document.querySelectorAll(".input-error").forEach(function(i){i.classList.remove("input-error")});if(ty==="error"){var fm=el.closest(".form");if(fm)fm.querySelectorAll("input").forEach(function(i){i.classList.add("input-error")})}}

function gv(id){return document.getElementById(id).value.trim()}

async function handleLogin(){var u=gv("loginUsername"),p=gv("loginPassword");if(!u||!p){ss("loginStatus","请填写辩手名和密码","error");return}try{var r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});var d=await r.json();if(d.success){ss("loginStatus","登录成功！欢迎回到辩场","success");setTimeout(function(){loginSuccess(u)},800)}else{ss("loginStatus",d.message||"登录失败","error")}}catch(e){ss("loginStatus","网络错误，请重试","error")}}

async function handleRegister(){var u=gv("regUsername"),p=gv("regPassword"),c2=gv("regConfirm");if(!u||!p||!c2){ss("regStatus","请填写所有字段","error");return}if(u.length<2||u.length>20){ss("regStatus","辩手名长度应在2-20个字符之间","error");return}if(p.length<4){ss("regStatus","密码长度至少4位","error");return}if(p!==c2){ss("regStatus","两次密码输入不一致","error");return}try{var r=await fetch("/api/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});var d=await r.json();if(d.success){ss("regStatus","注册成功！自动登录中...","success");setTimeout(function(){loginSuccess(u)},800)}else{ss("regStatus",d.message||"注册失败","error")}}catch(e){ss("regStatus","网络错误，请重试","error")}}

document.addEventListener("keydown",function(e){if(e.key==="Enter"){if(ct==="login")handleLogin();else handleRegister()}});

document.querySelectorAll(".form input").forEach(function(i){i.addEventListener("focus",function(){cs()})});

var currentUser="",userPos="pro",debateActive=false,sessionId="",roundNum=0;

function loginSuccess(u){currentUser=u;document.getElementById("loginPanel").style.display="none";document.getElementById("debateArena").style.display="block";document.getElementById("chatInput").disabled=false;document.getElementById("sendBtn").disabled=false;}

function setPosition(p){userPos=p;var bs=document.querySelectorAll(".pos-btn");bs[0].className="pos-btn";bs[1].className="pos-btn";document.getElementById("userPosDisplay").textContent=p==="pro"?"正方":"反方";document.getElementById("aiPosDisplay").textContent=p==="pro"?"反方":"正方";if(p==="pro"){bs[0].classList.add("active","pro")}else{bs[1].classList.add("active","con")}}

var camStream=null,camOn=false;

async function toggleCamera(){var btn=document.getElementById("camToggle"),vid=document.getElementById("cameraFeed"),ph=document.getElementById("cameraPlaceholder");if(camOn){if(camStream)camStream.getTracks().forEach(function(t){t.stop()});camStream=null;camOn=false;vid.style.display="none";ph.style.display="flex";btn.innerHTML="&#x25B6; 打开摄像头";btn.classList.remove("active")}else{try{camStream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});vid.srcObject=camStream;camOn=true;vid.style.display="block";ph.style.display="none";btn.innerHTML="&#x25A0; 关闭摄像头";btn.classList.add("active")}catch(e){alert("无法打开摄像头，请检查权限")}}}

var rec=false,recog=null;

function toggleMic(){if(!("webkitSpeechRecognition"in window)&&!("SpeechRecognition"in window)){alert("当前浏览器不支持语音输入，请使用Chrome");return}if(rec){if(recog)recog.stop();document.getElementById("micBtn").classList.remove("recording");rec=false;return}var SR=window.SpeechRecognition||window.webkitSpeechRecognition;recog=new SR;recog.lang="zh-CN";recog.interimResults=true;recog.continuous=false;var ft="";recog.onresult=function(e){var im="";for(var i=e.resultIndex;i<e.results.length;i++){var t=e.results[i][0].transcript;if(e.results[i].isFinal)ft+=t;else im=t}document.getElementById("chatInput").value=ft+im};recog.onend=function(){document.getElementById("micBtn").classList.remove("recording");rec=false};recog.start();document.getElementById("micBtn").classList.add("recording");rec=true;}

async function startDebate(){var topic=document.getElementById("topicSelect").value;if(!topic){alert("请先选择辩题");return}if(debateActive){alert("辩论已在进行中");return}document.getElementById("startDebateBtn").disabled=true;document.getElementById("startDebateBtn").textContent="辩论进行中...";document.getElementById("endDebateBtn").disabled=false;document.getElementById("endDebateBtn").style.opacity="1";document.getElementById("headerTopic").textContent=topic;debateActive=true;roundNum=0;addMsg("system","辩论开始！AI准备就绪","");try{var r=await fetch("/api/debate/start",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:currentUser,topic:topic,position:userPos})});var d=await r.json();if(d.success){sessionId=d.session_id;roundNum=1;document.getElementById("roundDisplay").textContent=roundNum;addMsg("ai",d.message,roundNum)}else{addMsg("system","AI暂时无法回应，请检查配置","");endDebate()}}catch(e){addMsg("system","网络错误，请重试","");endDebate()}}

async function sendMessage(){var inp=document.getElementById("chatInput"),msg=inp.value.trim();if(!msg||!debateActive)return;inp.value="";addMsg("user",msg,roundNum);try{var r=await fetch("/api/debate/message",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session_id:sessionId,message:msg,round:roundNum})});var d=await r.json();if(d.success){roundNum++;document.getElementById("roundDisplay").textContent=roundNum;addMsg("ai",d.message,roundNum)}else{addMsg("system","AI暂时无法回应","")}}catch(e){addMsg("system","网络错误","")}}

function addMsg(type,content,rd){var chat=document.getElementById("debateChat");if(type==="system"){var dv4=document.createElement("div");dv4.style.cssText="text-align:center;padding:10px;color:rgba(255,215,180,0.25);font-size:13px;letter-spacing:2px;";dv4.textContent=content;chat.appendChild(dv4)}else{if(type==="ai"){var lb=document.createElement("div");lb.className="msg-round-label";lb.textContent="-- 第 "+rd+" 回合 --";chat.appendChild(lb)}var dv2=document.createElement("div");dv2.className="msg "+type;var now=new Date();var ts=(now.getHours()<10?"0":"")+now.getHours()+":"+(now.getMinutes()<10?"0":"")+now.getMinutes();dv2.innerHTML='<div class=\"msg-sender\">'+(type==="ai"?"&#x1F916; AI辩手":"&#x1F464; "+currentUser)+'</div><div>'+content+'</div><div class=\"msg-time\">'+ts+'</div>';chat.appendChild(dv2)}chat.scrollTop=chat.scrollHeight;}

var curReport=null;async function endDebate(){if(!debateActive)return;if(roundNum<5){addMsg("system","辩论需至少进行5轮才能结束。当前："+roundNum+"/5轮，请继续辩论。","");return}debateActive=false;document.getElementById("startDebateBtn").disabled=false;document.getElementById("startDebateBtn").textContent="▶ 开始辩论";document.getElementById("endDebateBtn").disabled=true;document.getElementById("endDebateBtn").style.opacity="0.3";addMsg("system","辩论结束，正在生成报告...","");try{await fetch("/api/debate/end",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session_id:sessionId})})}catch(e){}try{var r=await fetch("/api/scoring/report",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session_id:sessionId,username:currentUser})});var d=await r.json();if(d.success){curReport=d.report;setTimeout(function(){showReportPage(d.report)},500)}else{addMsg("system","报告生成失败","")}}catch(e){addMsg("system","报告生成失败："+e.message,"")}}

function showReportPage(rpt){document.getElementById("debateArena").style.display="none";document.getElementById("reportPage").style.display="block";document.getElementById("dbtiCode").textContent=rpt.dbti_code;document.getElementById("dbtiName").textContent=rpt.dbti_name;document.getElementById("dbtiDesc").textContent=rpt.dbti_desc||"";document.getElementById("rptSub").textContent="辩题："+(rpt.topic||"未指定")+" · 共"+(rpt.rounds||0)+"轮 · "+(rpt.dbti_name||"");var dims=["aggression","logic","rhythm","adaptability","presence"];var dnm={"aggression":"进攻性","logic":"逻辑密度","rhythm":"节奏控制","adaptability":"弹性适应","presence":"气势压制"};var clrs={"aggression":"#ff6b6b","logic":"#64c8ff","rhythm":"#ffd93d","adaptability":"#6bcb77","presence":"#8b6bc4"};var chartData=[];var sg=document.getElementById("scoreGrid");sg.innerHTML="";for(var d of dims){var sc=(rpt.scores&&rpt.scores[d]&&rpt.scores[d].score)||50;sg.innerHTML+="<div class=\"score-item\"><div class=\"sc-val\" style=\"color:"+clrs[d]+"\">"+sc+"</div><div class=\"sc-lbl\">"+dnm[d]+"</div></div>";chartData.push(sc)}var statsEl=document.getElementById("statsGrid");var rt=(rpt.stats?rpt.stats.rebuttals||0:0);var tt=(rpt.stats?Math.round(rpt.stats.talk_time||0):0);statsEl.innerHTML="<div class=\"stat-item\"><div class=\"stat-val\">"+(rpt.total||0)+"</div><div class=\"stat-lbl\">总分</div></div><div class=\"stat-item\"><div class=\"stat-val\">"+(rpt.rounds||0)+"</div><div class=\"stat-lbl\">辩论轮数</div></div><div class=\"stat-item\"><div class=\"stat-val\">"+rt+"</div><div class=\"stat-lbl\">反驳次数</div></div>";var rc=document.getElementById("radarChart");rc.innerHTML="";if(typeof echarts!="undefined"){try{var chart=echarts.init(rc);chart.setOption({radar:{indicator:dims.map(function(d){return{name:dnm[d],max:100}}),radius:"65%",axisName:{color:"rgba(255,215,180,0.5)",fontSize:11},splitArea:{areaStyle:{color:["rgba(200,155,74,0.02)","rgba(200,155,74,0.04)"]}},axisLine:{lineStyle:{color:"rgba(255,215,150,0.08)"}},splitLine:{lineStyle:{color:"rgba(255,215,150,0.08)"}}},series:[{type:"radar",data:[{value:chartData,areaStyle:{color:"rgba(200,155,74,0.15)"},lineStyle:{color:"rgba(200,155,74,0.6)",width:2},itemStyle:{color:"rgba(200,155,74,0.9)"}}],symbol:"circle",symbolSize:6}]})}catch(e){rc.innerHTML="<div style=\"text-align:center;padding:40px;color:rgba(255,215,180,0.2);\">雷达图生成失败</div>"}}else{rc.innerHTML="<div style=\"text-align:center;padding:40px;color:rgba(255,215,180,0.2);\">"+chartData.join(" | ")+"</div>"}}
function hideReport(){document.getElementById("reportPage").style.display="none";document.getElementById("debateArena").style.display="block"}
function exportReport(){if(!curReport){alert("无报告可导出");return}var txt="辩境 - AI辩论能力报告\r\n";txt+="辩题："+(curReport.topic||"")+"\r\n";txt+="DBTI："+curReport.dbti_code+" - "+curReport.dbti_name+"\r\n";txt+="总分："+(curReport.total||0)+"\r\n";txt+="轮数："+(curReport.rounds||0)+"\r\n";if(curReport.scores){for(var k in curReport.scores){txt+=curReport.scores[k].name+"："+curReport.scores[k].score+"\r\n"}}var blob=new Blob([txt],{type:"text/plain;charset=utf-8"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="辩论报告_"+(curReport.dbti_code||"unknown")+".txt";a.click();URL.revokeObjectURL(a.href)}
function showHistory(){var m=document.getElementById("historyModal");m.style.display="flex";var hl=document.getElementById("historyList");hl.innerHTML="<div style=\"text-align:center;padding:30px;color:rgba(255,215,180,0.2);font-size:13px;letter-spacing:2px;\">加载历史记录...</div>";fetch("/api/report/list",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:currentUser})}).then(function(r){return r.json()}).then(function(d){if(d.success&&d.reports.length){hl.innerHTML="";d.reports.forEach(function(r){var d2=new Date(r.timestamp*1000);var ts=d2.getFullYear()+"-"+(d2.getMonth()+1)+"-"+d2.getDate()+" "+d2.getHours()+":"+(d2.getMinutes()<10?"0":"")+d2.getMinutes();var item=document.createElement("div");item.className="hm-item";item.innerHTML="<div class=\"hm-topic\">"+(r.topic||"未知辩题")+"</div><div class=\"hm-meta\"><span>"+r.dbti_code+" "+r.dbti_name+"</span><span>"+r.total_score+"分</span><span>"+r.rounds+"轮</span><span>"+ts+"</span></div>";item.onclick=function(){loadReport(r.id)};hl.appendChild(item)})}else{hl.innerHTML="<div style=\"text-align:center;padding:30px;color:rgba(255,215,180,0.2);font-size:13px;letter-spacing:2px;\">暂无历史记录</div>"}}).catch(function(){hl.innerHTML="<div style=\"text-align:center;padding:30px;color:#ff6b6b;font-size:13px;letter-spacing:2px;\">加载失败</div>"})}
function closeHistory(){document.getElementById("historyModal").style.display="none"}
function loadReport(rid){closeHistory();fetch("/api/report/get",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({report_id:rid})}).then(function(r){return r.json()}).then(function(d){if(d.success&&d.report){curReport=d.report;showReportPage(d.report)}})}

document.addEventListener("keydown",function(e){if(e.key==="Enter"&&debateActive)sendMessage()});

</script>
